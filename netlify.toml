# Fork-and-go 流程(painless,無需 GitHub secret):
#   1. Netlify Dashboard → New site → 連 repo
#   2. Netlify 自動讀本 file → build storybook-static → deploy
#   3. 完成。每次 push main → Netlify auto rebuild。

[build]
  command = "npm run build-storybook"
  publish = "storybook-static"

[build.environment]
  NODE_VERSION = "22"

# 免費密碼保護 — Edge Function 自己做 HTTP Basic Auth(見 netlify/edge-functions/basic-auth.ts)。
# 設 env var STORYBOOK_BASIC_AUTH="user:password"(多組空格分隔)→ 站台跳帳密彈窗;未設 = 公開 pass-through。
[[edge_functions]]
  path = "/*"
  function = "basic-auth"

# Per-branch deploy previews 預設啟用(任何 branch push → 自動 preview URL)
# Production deploy 走 main

# ─── Access control ──────────────────────────────────────────────────────────
# 1️⃣ Defense-in-depth: 反 SEO indexing(X-Robots-Tag noindex)
# 2️⃣ Real auth: Edge Function Basic Auth(免費,讀 STORYBOOK_BASIC_AUTH env var)

[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
